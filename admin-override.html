<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialBoost - Manual Override</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <div id="adminArea" class="bg-slate-800 p-6 rounded-3xl shadow-2xl border border-slate-700 mt-10">
            <div class="flex items-center justify-between mb-2 gap-2">
                <a
                    href="admin.html"
                    class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded-xl"
                >
                    ← กลับ Dashboard
                </a>

                <h2 class="text-2xl font-bold text-yellow-400 text-center flex-1">🛠 Manual Override</h2>

                <button
                    type="button"
                    onclick="logoutAdmin()"
                    class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded-xl"
                >
                    ออกจากระบบ
                </button>
            </div>

            <p class="text-center text-slate-400 text-sm mb-6">ใช้ Order ID เพื่อสั่งงานแมนนวลเมื่อระบบอัตโนมัติมีปัญหา</p>

            <form id="adminForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">รหัสออเดอร์ (Order ID)</label>
                    <input
                        type="text"
                        id="orderID"
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white"
                        placeholder="เช่น ORD2024XXXX"
                        required
                        maxlength="100"
                    >
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Service ID</label>
                    <select id="service" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white" required>
                        <option value="">-- กำลังโหลดบริการ... --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">จำนวน</label>
                    <input
                        type="number"
                        id="qty"
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white"
                        placeholder="จำนวน"
                        required
                        min="1"
                        step="1"
                    >
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">ลิงก์งาน</label>
                    <input
                        type="url"
                        id="link"
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white"
                        placeholder="https://..."
                        required
                    >
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">ผู้ดำเนินการ</label>
                    <input
                        type="text"
                        id="operator"
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white"
                        placeholder="เช่น admin_nakorn"
                        required
                        maxlength="50"
                    >
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">เหตุผลที่ Override</label>
                    <textarea
                        id="adminNote"
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white min-h-[80px]"
                        placeholder="อธิบายสาเหตุที่ต้องสั่งงานแมนนวล"
                        required
                        maxlength="500"
                    ></textarea>
                </div>

                <hr class="border-slate-700 my-4">

                <button
                    type="submit"
                    id="submitBtn"
                    class="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold py-4 rounded-2xl transition-all"
                >
                    ⚡️ ยืนยันการสั่งงาน
                </button>
            </form>
        </div>

        <p id="status" class="mt-4 text-center text-sm font-bold"></p>
    </div>

    <script>
        const ADMIN_WEBHOOK = "https://hook.eu1.make.com/f77e3nr7tiwft9ow2ig710ksnga4ngjt";
        const ADMIN_SECRET = "100818";
        const SESSION_KEY = "socialboost_admin_ok";
        const DASHBOARD_URL = "admin-center.html";
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1a5vOZQV591jVJKoOXByjQvZBeB1IUEREr8qFSHsWsE0/export?format=csv&t=" + Date.now();

        let servicesLoaded = false;

        function setStatus(message, type = "info") {
            const status = document.getElementById("status");
            if (!status) return;

            status.className = "mt-4 text-center text-sm font-bold";

            if (type === "success") {
                status.classList.add("text-green-400");
            } else if (type === "error") {
                status.classList.add("text-red-400");
            } else {
                status.classList.add("text-slate-300");
            }

            status.textContent = message || "";
        }

        function clearStatus() {
            setStatus("", "info");
        }

        function getTrimmedValue(id) {
            const el = document.getElementById(id);
            return el ? String(el.value || "").trim() : "";
        }

        function isPositiveInteger(value) {
            return /^[1-9]\d*$/.test(String(value).trim());
        }

        function isValidHttpUrl(url) {
            try {
                const parsed = new URL(url);
                return parsed.protocol === "http:" || parsed.protocol === "https:";
            } catch (_) {
                return false;
            }
        }

        function requireSession() {
            if (sessionStorage.getItem(SESSION_KEY) !== "1") {
                window.location.href = DASHBOARD_URL;
                return false;
            }
            return true;
        }

        function logoutAdmin() {
            sessionStorage.removeItem(SESSION_KEY);
            window.location.href = DASHBOARD_URL;
        }

        function parseCSV(text) {
            const rows = [];
            let row = [];
            let current = "";
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const next = text[i + 1];

                if (char === '"') {
                    if (inQuotes && next === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === "," && !inQuotes) {
                    row.push(current);
                    current = "";
                } else if ((char === "\n" || char === "\r") && !inQuotes) {
                    if (char === "\r" && next === "\n") i++;
                    row.push(current);

                    if (row.some(cell => String(cell).trim() !== "")) {
                        rows.push(row);
                    }

                    row = [];
                    current = "";
                } else {
                    current += char;
                }
            }

            if (current.length > 0 || row.length > 0) {
                row.push(current);
                if (row.some(cell => String(cell).trim() !== "")) {
                    rows.push(row);
                }
            }

            return rows;
        }

        async function loadServices() {
            const serviceSelect = document.getElementById("service");
            if (!serviceSelect) return;

            try {
                serviceSelect.innerHTML = '<option value="">-- กำลังโหลดบริการ... --</option>';

                const response = await fetch(SHEET_CSV_URL, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error("โหลดข้อมูลบริการไม่สำเร็จ");
                }

                const csvText = await response.text();
                const rows = parseCSV(csvText);

                if (!rows.length || rows.length === 1) {
                    throw new Error("ไม่พบข้อมูลบริการ");
                }

                const dataRows = rows.slice(1);
                const seen = new Set();

                serviceSelect.innerHTML = '<option value="">-- เลือกบริการ --</option>';

                dataRows.forEach(cols => {
                    const platform = String(cols[1] || "").trim();    // B
                    const serviceName = String(cols[2] || "").trim(); // C
                    const serviceId24 = String(cols[6] || "").trim(); // G

                    if (!platform || !serviceName || !serviceId24) return;
                    if (seen.has(serviceId24)) return;

                    seen.add(serviceId24);

                    const option = document.createElement("option");
                    option.value = serviceId24;
                    option.textContent = `${platform} - ${serviceName} (${serviceId24})`;
                    serviceSelect.appendChild(option);
                });

                if (serviceSelect.options.length <= 1) {
                    serviceSelect.innerHTML = '<option value="">-- ไม่พบบริการที่ใช้งานได้ --</option>';
                    setStatus("ไม่พบบริการในชีต", "error");
                    return;
                }

                servicesLoaded = true;
            } catch (err) {
                serviceSelect.innerHTML = '<option value="">-- โหลดบริการไม่สำเร็จ --</option>';
                setStatus("โหลดรายการบริการไม่สำเร็จ: " + (err.message || err), "error");
            }
        }

        function validateForm() {
            const orderID = getTrimmedValue("orderID");
            const service = getTrimmedValue("service");
            const qty = getTrimmedValue("qty");
            const link = getTrimmedValue("link");
            const operator = getTrimmedValue("operator");
            const adminNote = getTrimmedValue("adminNote");

            if (!orderID || orderID.length < 4) {
                return "กรุณากรอกรหัสออเดอร์ให้ถูกต้อง";
            }

            if (!service) {
                return "กรุณาเลือกบริการ";
            }

            if (!isPositiveInteger(qty)) {
                return "จำนวนต้องเป็นจำนวนเต็มที่มากกว่า 0";
            }

            if (!isValidHttpUrl(link)) {
                return "กรุณากรอกลิงก์งานให้ถูกต้อง";
            }

            if (!operator) {
                return "กรุณากรอกชื่อผู้ดำเนินการ";
            }

            if (!adminNote) {
                return "กรุณากรอกเหตุผลที่ override";
            }

            return "";
        }

        async function submitAdminForm(e) {
            e.preventDefault();

            if (!requireSession()) return;

            const validationError = validateForm();
            if (validationError) {
                setStatus(validationError, "error");
                return;
            }

            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.textContent = "⏳ กำลังส่งข้อมูล...";

            const payload = {
                admin_secret: ADMIN_SECRET,
                orderID: getTrimmedValue("orderID"),
                service: getTrimmedValue("service"),
                qty: Number(getTrimmedValue("qty")),
                link: getTrimmedValue("link"),
                operator: getTrimmedValue("operator"),
                admin_note: getTrimmedValue("adminNote"),
                method: "admin_manual",
                requested_at: new Date().toISOString()
            };

            try {
                const res = await fetch(ADMIN_WEBHOOK, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const rawText = await res.text();

                if (!res.ok) {
                    throw new Error("Webhook Error (" + res.status + ")");
                }

                let result;
                try {
                    result = JSON.parse(rawText);
                } catch (_) {
                    result = rawText.trim();
                }

                if (typeof result === "string") {
                    const lower = result.toLowerCase();

                    if (result === "OK" || lower === "success") {
                        setStatus("ส่งข้อมูลแล้ว ระบบกำลังค้นหาและสั่งงานให้", "success");
                        document.getElementById("adminForm").reset();
                        return;
                    }

                    setStatus("ระบบตอบกลับ: " + result, "error");
                    return;
                }

                if (result && typeof result === "object") {
                    const success =
                        result.success === true ||
                        result.status === "success" ||
                        result.status === "SUCCESS" ||
                        result.status === "OK";

                    const message =
                        result.message ||
                        result.detail ||
                        result.error ||
                        "";

                    if (success) {
                        setStatus(message || "ส่งข้อมูลแล้ว ระบบกำลังค้นหาและสั่งงานให้", "success");
                        document.getElementById("adminForm").reset();
                    } else {
                        setStatus(message || "ระบบไม่สามารถสั่งงานได้", "error");
                    }

                    return;
                }

                setStatus("ระบบตอบกลับไม่ถูกต้อง", "error");
            } catch (err) {
                setStatus(err?.message || "Webhook ไม่ตอบสนอง", "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "⚡️ ยืนยันการสั่งงาน";
            }
        }

        document.getElementById("adminForm").addEventListener("submit", submitAdminForm);

        [
            "orderID",
            "service",
            "qty",
            "link",
            "operator",
            "adminNote"
        ].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener("input", clearStatus);
                el.addEventListener("change", clearStatus);
            }
        });

        window.onload = async function() {
            if (!requireSession()) return;

            if (!servicesLoaded) {
                await loadServices();
            }
        };
    </script>
</body>
</html>
