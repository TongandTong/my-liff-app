<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialBoost - ระบบสั่งงานอัตโนมัติ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
        .pay-method-btn.active {
            border-color: #2563eb;
            background: #eff6ff;
            color: #1d4ed8;
        }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg overflow-hidden p-6">
        <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">🚀 SocialBoost Setup</h2>

        <div id="orderSection">
            <div class="mb-4">
                <label class="block text-gray-700">เลือก Platform</label>
                <select id="platformSelect" onchange="filterCategories()" class="w-full border rounded-lg p-2 mt-1 bg-gray-50">
                    <option value="">-- กำลังโหลดข้อมูล... --</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700">เลือกหมวดหมู่</label>
                <select id="categorySelect" onchange="filterServices()" disabled class="w-full border rounded-lg p-2 mt-1 bg-gray-50">
                    <option value="">-- เลือก Platform ก่อน --</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700">เลือกบริการ</label>
                <select id="serviceSelect" onchange="updateMinMax()" disabled class="w-full border rounded-lg p-2 mt-1 bg-gray-50">
                    <option value="">-- เลือกหมวดหมู่ก่อน --</option>
                </select>
                <p id="limitNote" class="text-xs text-blue-500 mt-1"></p>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700">จำนวนที่ต้องการ</label>
                <input type="number" id="quantity" oninput="calculatePrice()" placeholder="กรอกจำนวน..." class="w-full border rounded-lg p-2 mt-1">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700">ลิงก์งาน (URL)</label>
                <input type="text" id="targetLink" placeholder="https://..." class="w-full border rounded-lg p-2 mt-1">
            </div>

            <div class="bg-blue-50 p-4 rounded-lg mb-6">
                <p class="text-sm text-gray-600">ยอดชำระทั้งสิ้น:</p>
                <p class="text-2xl font-bold text-blue-600">฿ <span id="totalPrice">0.00</span></p>
            </div>

            <button onclick="goToPayment()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">ไปหน้าชำระเงิน</button>
        </div>

        <div id="paymentSection" style="display: none;">
            <button onclick="backToOrder()" class="text-blue-600 text-sm mb-4">← ย้อนกลับไปแก้ไข</button>
            <h3 class="text-lg font-bold mb-4">💳 เลือกวิธีชำระเงิน</h3>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <button id="methodStripeBtn" type="button" onclick="selectPaymentMethod('stripe_qr')" class="pay-method-btn active w-full border-2 border-gray-200 rounded-xl p-3 text-left transition">
                    <div class="font-bold">สแกน QR อัตโนมัติ</div>
                    <div class="text-xs text-gray-500 mt-1">Stripe PromptPay</div>
                </button>
                <button id="methodManualBtn" type="button" onclick="selectPaymentMethod('manual_transfer')" class="pay-method-btn w-full border-2 border-gray-200 rounded-xl p-3 text-left transition">
                    <div class="font-bold">โอนเอง + แนบสลิป</div>
                    <div class="text-xs text-gray-500 mt-1">ตรวจสลิปอัตโนมัติ</div>
                </button>
            </div>

            <div class="bg-gray-100 p-4 rounded-lg text-center mb-4">
                <p class="text-sm text-gray-500">ยอดที่ต้องชำระ:</p>
                <p class="text-xl font-bold text-red-500">฿ <span id="finalAmount">0.00</span></p>
                <p id="stripeMinNotice" class="text-xs text-orange-600 mt-2 hidden">QR อัตโนมัติใช้ได้เมื่อยอดตั้งแต่ 10 บาทขึ้นไป</p>
            </div>

            <div id="stripeSection" class="mb-4">
                <div class="bg-blue-50 border border-blue-200 p-4 rounded-xl mb-4">
                    <p class="font-semibold text-blue-700">ชำระผ่าน Stripe PromptPay QR</p>
                    <p class="text-sm text-gray-600 mt-1">ระบบจะสร้าง QR ตามยอดอัตโนมัติและล็อกยอดให้ลูกค้า</p>
                </div>
                <button id="createStripePaymentBtn" onclick="createStripePayment()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">สร้าง QR เพื่อชำระเงิน</button>
            </div>

            <div id="manualSection" style="display:none;">
                <div class="bg-blue-600 text-white p-4 rounded-xl mb-4 shadow-md">
                    <p class="text-xs opacity-80">บัญชีรับเงิน (PromptPay)</p>
                    <p class="text-xl font-bold tracking-widest">750-218-3456</p>
                    <p class="text-sm">ชื่อบัญชี: นาย นคร เมฆพะโยม</p>
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 mb-2 font-semibold">อัปโหลดรูปสลิป</label>
                    <input type="file" id="slipFile" accept="image/*" class="w-full border border-dashed border-gray-400 p-4 rounded-lg">
                </div>

                <button id="submitBtn" onclick="submitManualOrder()" class="w-full bg-green-500 text-white py-3 rounded-lg font-bold hover:bg-green-600 transition">ยืนยันการโอนเงิน</button>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009857155-P69Z9Mo9";
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1a5vOZQV591jVJKoOXByjQvZBeB1IUEREr8qFSHsWsE0/export?format=csv&gid=836222095&t=" + Date.now();
        const webhookUrl = "https://hook.eu1.make.com/uoixikfgbu10pc959jf2t8mroihi4mky";

        let allServices = [];
        let selectedPaymentMethod = "stripe_qr";

        window.onerror = function(msg, url, line) {
            alert("❌ เกิดข้อผิดพลาด: " + msg + "\nบรรทัดที่: " + line);
            return false;
        };

        window.onload = function() {
            initLIFF();
        };

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });

                // เปิดนอก LINE / เปิดจาก browser ปกติ: ให้โหลดข้อมูลได้ ไม่บังคับ login
                if (!liff.isInClient() && !liff.isLoggedIn()) {
                    await loadSheetData();
                    return;
                }

                // เปิดใน LINE LIFF: ถ้ายังไม่ login ให้ login ก่อน
                if (!liff.isLoggedIn()) {
    liff.login({ redirectUri: window.location.href });
    return;
}
                await loadSheetData();
            } catch (err) {
                console.warn("LIFF init failed:", err);

                // กันหน้าเว็บพัง: ถ้า LIFF มีปัญหา ยังให้ทดสอบหน้าเว็บและโหลดบริการได้
                try {
                    await loadSheetData();
                    alert("⚠️ เปิดหน้าเว็บได้ แต่ LIFF ยังไม่พร้อม: " + getErrorMessage(err));
                } catch (loadErr) {
                    alert("❌ โหลดข้อมูลพลาด: " + getErrorMessage(loadErr));
                }
            }
        }

        async function loadSheetData() {
            try {
                const response = await fetch(SHEET_CSV_URL, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error("ไม่สามารถโหลดข้อมูลบริการได้ (" + response.status + ")");
                }

                const text = await response.text();
                const rows = parseCSV(text);

                if (!rows.length || rows.length === 1) {
                    throw new Error("ไม่พบข้อมูลบริการใน Google Sheet");
                }

                const dataRows = rows.slice(1);

                allServices = dataRows.map(cols => {
                    const pricingMode = String(cols[9] || "").trim().toLowerCase() || "auto";   // J = Pricing_Mode
                    const manualSellPrice = parseFloat(cols[11]) || 0;                           // L = Manual_Sell_Price
                    const basePrice = parseFloat(cols[5]) || 0;                                  // F = Price_Per_1
                    const finalPrice = pricingMode === "manual" && manualSellPrice > 0
                        ? manualSellPrice
                        : basePrice;

                    return {
                        id: String(cols[0] || "").trim(),                   // A = ID
                        platform: String(cols[1] || "").trim(),             // B = Platform
                        category: String(cols[2] || "").trim() || "ทั่วไป", // C = Category
                        min: parseInt(cols[3], 10) || 0,                    // D = Min_Qty
                        max: parseInt(cols[4], 10) || 0,                    // E = Max_Qty
                        price: finalPrice,                                  // ราคาที่ใช้จริง
                        raw_price: basePrice,                               // ราคาเดิม
                        pricing_mode: pricingMode,                          // J = Pricing_Mode
                        default_provider: String(cols[10] || "").trim(),    // K = Default_Provider
                        manual_sell_price: manualSellPrice,                 // L = Manual_Sell_Price
                        status: String(cols[8] || "").trim().toLowerCase(), // I = Status
                        id_24social: String(cols[6] || "").trim(),          // G = ID_SMM
                        name: String(cols[7] || "").trim()                  // H = Service Name
                    };
                }).filter(s => s.id && s.platform && s.name && s.status === "active");

                const platforms = [...new Set(allServices.map(s => s.platform))];
                const pSelect = document.getElementById("platformSelect");

                if (!pSelect) return;

                pSelect.innerHTML = "";
                appendOption(pSelect, "", "-- เลือก Platform --");

                platforms.forEach(platform => {
                    appendOption(pSelect, platform, platform);
                });

                resetCategorySelect();
                resetServiceSelect();
                clearOrderInfo();
            } catch (error) {
                alert("❌ โหลดข้อมูลพลาด: " + getErrorMessage(error));
            }
        }

        function parseCSV(text) {
            const rows = [];
            let row = [];
            let current = "";
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const next = text[i + 1];
                if (char === '"') {
                    if (inQuotes && next === '"') { current += '"'; i++; }
                    else inQuotes = !inQuotes;
                } else if (char === "," && !inQuotes) {
                    row.push(current); current = "";
                } else if ((char === "\n" || char === "\r") && !inQuotes) {
                    if (char === "\r" && next === "\n") i++;
                    row.push(current);
                    if (row.some(cell => String(cell).trim() !== "")) rows.push(row);
                    row = []; current = "";
                } else {
                    current += char;
                }
            }
            if (current.length > 0 || row.length > 0) {
                row.push(current);
                if (row.some(cell => String(cell).trim() !== "")) rows.push(row);
            }
            return rows;
        }

        function appendOption(selectEl, value, text) {
            const opt = document.createElement("option");
            opt.value = value;
            opt.textContent = text;
            selectEl.appendChild(opt);
        }

        function resetCategorySelect() {
            const cSelect = document.getElementById("categorySelect");
            cSelect.innerHTML = "";
            appendOption(cSelect, "", "-- เลือก Platform ก่อน --");
            cSelect.disabled = true;
        }

        function resetServiceSelect() {
            const sSelect = document.getElementById("serviceSelect");
            sSelect.innerHTML = "";
            appendOption(sSelect, "", "-- เลือกหมวดหมู่ก่อน --");
            sSelect.disabled = true;
        }

        function clearOrderInfo() {
            document.getElementById("limitNote").textContent = "";
            document.getElementById("quantity").value = "";
            setMoney("totalPrice", 0);
            setMoney("finalAmount", 0);
            updatePaymentMethodUI();
        }

        function filterCategories() {
            const platform = document.getElementById("platformSelect").value || "";
            const cSelect = document.getElementById("categorySelect");
            resetServiceSelect();
            clearOrderInfo();
            cSelect.innerHTML = "";
            appendOption(cSelect, "", "-- เลือกหมวดหมู่ --");
            if (!platform) {
                cSelect.innerHTML = "";
                appendOption(cSelect, "", "-- เลือก Platform ก่อน --");
                cSelect.disabled = true;
                return;
            }
            const categories = [...new Set(allServices.filter(service => service.platform === platform).map(service => service.category || "ทั่วไป"))];
            categories.forEach(category => appendOption(cSelect, category, category));
            cSelect.disabled = false;
        }

        function filterServices() {
            const platform = document.getElementById("platformSelect").value || "";
            const category = document.getElementById("categorySelect").value || "";
            const sSelect = document.getElementById("serviceSelect");
            sSelect.innerHTML = "";
            appendOption(sSelect, "", "-- เลือกบริการ --");
            clearOrderInfo();
            if (!platform || !category) {
                sSelect.disabled = true;
                return;
            }
            allServices
                .filter(service => service.platform === platform && (service.category || "ทั่วไป") === category)
                .forEach(service => appendOption(sSelect, service.id, service.name));
            sSelect.disabled = false;
        }

        function updateMinMax() {
            const service = getSelectedService();
            const limitNote = document.getElementById("limitNote");
            limitNote.textContent = service ? `💡 ขั้นต่ำ: ${service.min.toLocaleString()} | สูงสุด: ${service.max.toLocaleString()}` : "";
            calculatePrice();
        }

        function calculatePrice() {
            const service = getSelectedService();
            const qty = Number(document.getElementById("quantity").value || 0);
            let total = 0;
            if (service && Number.isFinite(qty) && qty > 0) total = (qty * service.price) / 1000;
            setMoney("totalPrice", total);
            setMoney("finalAmount", total);
            updatePaymentMethodUI();
        }

        function getTotalPriceNumber() {
            const service = getSelectedService();
            const qty = Number(document.getElementById("quantity").value || 0);
            if (!service || !Number.isFinite(qty) || qty <= 0) return 0;
            return Number(((qty * service.price) / 1000).toFixed(2));
        }

        function setMoney(elementId, amount) {
            const el = document.getElementById(elementId);
            el.textContent = Number(amount || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function isPositiveInteger(value) {
            return /^[1-9]\d*$/.test(String(value).trim());
        }

        function isValidHttpUrl(url) {
            try {
                const parsed = new URL(url);
                return parsed.protocol === "http:" || parsed.protocol === "https:";
            } catch (e) {
                return false;
            }
        }

        function getSelectedService() {
            const sid = document.getElementById("serviceSelect").value || "";
            return allServices.find(s => s.id === sid) || null;
        }

        function validateOrderFields() {
            const service = getSelectedService();
            const qtyInput = document.getElementById("quantity").value || "";
            const qty = Number(qtyInput);
            const link = (document.getElementById("targetLink").value || "").trim();

            if (!service) return { ok: false, message: "กรุณาเลือกบริการ" };
            if (!isPositiveInteger(qtyInput)) return { ok: false, message: "กรุณากรอกจำนวนเป็นเลขจำนวนเต็มที่มากกว่า 0" };
            if (qty < service.min) return { ok: false, message: `จำนวนต่ำกว่าขั้นต่ำที่กำหนด (${service.min.toLocaleString()})` };
            if (qty > service.max) return { ok: false, message: `จำนวนเกินกว่าขั้นสูงสุดที่กำหนด (${service.max.toLocaleString()})` };
            if (!link) return { ok: false, message: "กรุณากรอกลิงก์งาน" };
            if (!isValidHttpUrl(link)) return { ok: false, message: "กรุณากรอกลิงก์ให้ถูกต้อง" };
            return { ok: true };
        }

        function goToPayment() {
            const validation = validateOrderFields();
            if (!validation.ok) {
                alert("❌ " + validation.message);
                return;
            }
            document.getElementById("orderSection").style.display = "none";
            document.getElementById("paymentSection").style.display = "block";
            updatePaymentMethodUI();
        }

        function backToOrder() {
            document.getElementById("orderSection").style.display = "block";
            document.getElementById("paymentSection").style.display = "none";
        }

        function selectPaymentMethod(method) {
            selectedPaymentMethod = method;
            updatePaymentMethodUI();
        }

        function updatePaymentMethodUI() {
            const total = getTotalPriceNumber();
            const stripeAllowed = total >= 10;
            const stripeBtn = document.getElementById("methodStripeBtn");
            const manualBtn = document.getElementById("methodManualBtn");
            const stripeSection = document.getElementById("stripeSection");
            const manualSection = document.getElementById("manualSection");
            const stripeMinNotice = document.getElementById("stripeMinNotice");
            const createStripePaymentBtn = document.getElementById("createStripePaymentBtn");

            if (selectedPaymentMethod === "stripe_qr" && !stripeAllowed) selectedPaymentMethod = "manual_transfer";

            stripeBtn.classList.toggle("active", selectedPaymentMethod === "stripe_qr");
            manualBtn.classList.toggle("active", selectedPaymentMethod === "manual_transfer");

            stripeBtn.disabled = !stripeAllowed;
            stripeBtn.classList.toggle("opacity-50", !stripeAllowed);
            stripeBtn.classList.toggle("cursor-not-allowed", !stripeAllowed);
            stripeSection.style.display = selectedPaymentMethod === "stripe_qr" ? "block" : "none";
            manualSection.style.display = selectedPaymentMethod === "manual_transfer" ? "block" : "none";
            stripeMinNotice.classList.toggle("hidden", stripeAllowed);
            createStripePaymentBtn.disabled = !stripeAllowed;
            createStripePaymentBtn.classList.toggle("opacity-50", !stripeAllowed);
            createStripePaymentBtn.classList.toggle("cursor-not-allowed", !stripeAllowed);
        }

        function validateSlipFile(file) {
            if (!file) return { ok: false, message: "กรุณาแนบสลิป" };
            const allowedTypes = ["image/jpeg", "image/jpg", "image/png", "image/webp"];
            const maxSizeBytes = 5 * 1024 * 1024;
            if (!allowedTypes.includes(file.type)) return { ok: false, message: "รองรับเฉพาะไฟล์ JPG, PNG, WEBP" };
            if (file.size > maxSizeBytes) return { ok: false, message: "ขนาดไฟล์ต้องไม่เกิน 5 MB" };
            return { ok: true };
        }

        function setSubmitButtonLoading(isLoading, buttonId = "submitBtn", loadingText = "กำลังส่งข้อมูล...", normalText = "ยืนยันการโอนเงิน") {
            const btn = document.getElementById(buttonId);
            if (!btn) return;
            btn.disabled = isLoading;
            btn.textContent = isLoading ? loadingText : normalText;
        }

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function() {
                    try {
                        const result = String(reader.result || "");
                        const parts = result.split(",");
                        if (!parts[1]) return reject(new Error("ไม่สามารถอ่านไฟล์สลิปได้"));
                        resolve(parts[1]);
                    } catch (err) { reject(err); }
                };
                reader.onerror = function() { reject(new Error("เกิดข้อผิดพลาดระหว่างอ่านไฟล์")); };
                reader.readAsDataURL(file);
            });
        }

        async function buildBasePayload() {
            let profile = {
                displayName: "Guest",
                userId: "guest_" + Date.now()
            };

            try {
                if (typeof liff !== "undefined" && liff.isLoggedIn()) {
                    profile = await liff.getProfile();
                }
            } catch (e) {
                console.warn("Cannot get LIFF profile:", e);
            }

            const service = getSelectedService();
            const qty = Number(document.getElementById("quantity").value || 0);
            const link = (document.getElementById("targetLink").value || "").trim();
            const total = getTotalPriceNumber();

            return {
                customer_name: profile.displayName || "Guest",
                userId: profile.userId || "",
                platform: service.platform,
                category: service.category || "ทั่วไป",
                service_name: service.name,
                service_id: service.id_24social,
                local_service_id: service.id,
                quantity: qty,
                link: link,
                unit_price: service.price,
                pricing_mode: service.pricing_mode,
                default_provider: service.default_provider,
                total_price: total.toFixed(2),
                payment_method: selectedPaymentMethod
            };
        }

        async function createStripePayment() {
            const validation = validateOrderFields();
            if (!validation.ok) return alert("❌ " + validation.message);

            const total = getTotalPriceNumber();
            if (total < 10) return alert("❌ QR อัตโนมัติใช้ได้เมื่อยอดตั้งแต่ 10 บาทขึ้นไป");

            setSubmitButtonLoading(true, "createStripePaymentBtn", "กำลังสร้าง QR...", "สร้าง QR เพื่อชำระเงิน");
            try {
                const payload = await buildBasePayload();
                payload.action = "create_stripe_payment";

                const response = await fetch(webhookUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const rawText = await response.text();
                if (!response.ok) throw new Error("Webhook Error (" + response.status + "): " + rawText);

                let result;
                try { result = JSON.parse(rawText); }
                catch (_) { result = rawText.trim(); }

                handleStripePaymentResponse(result);
            } catch (err) {
                alert("❌ " + getErrorMessage(err));
                setSubmitButtonLoading(false, "createStripePaymentBtn", "กำลังสร้าง QR...", "สร้าง QR เพื่อชำระเงิน");
            }
        }

        function handleStripePaymentResponse(result) {
            const paymentUrl = result && (result.payment_url || result.hosted_instructions_url || result.url);
            if (!paymentUrl) {
                alert("❌ ระบบยังไม่ได้ลิงก์ชำระเงินจาก Stripe");
                setSubmitButtonLoading(false, "createStripePaymentBtn", "กำลังสร้าง QR...", "สร้าง QR เพื่อชำระเงิน");
                return;
            }
            alert("✅ สร้าง QR สำเร็จ กำลังพาไปหน้าชำระเงิน");
            window.location.href = paymentUrl;
        }

        async function submitManualOrder() {
            const validation = validateOrderFields();
            if (!validation.ok) return alert("❌ " + validation.message);

            const slipInput = document.getElementById("slipFile");
            const slipFile = slipInput && slipInput.files ? slipInput.files[0] : null;
            const fileValidation = validateSlipFile(slipFile);
            if (!fileValidation.ok) return alert("❌ " + fileValidation.message);

            setSubmitButtonLoading(true, "submitBtn", "กำลังส่งข้อมูล...", "ยืนยันการโอนเงิน");
            try {
                const payload = await buildBasePayload();
                const base64Slip = await readFileAsBase64(slipFile);

                payload.action = "verify_manual_slip";
                payload.slip_image = base64Slip;
                payload.slip_file_name = slipFile.name;
                payload.slip_file_type = slipFile.type;
                payload.slip_file_size = slipFile.size;

                const response = await fetch(webhookUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const rawText = await response.text();
                if (!response.ok) throw new Error("Webhook Error (" + response.status + "): " + rawText);

                let result;
                try { result = JSON.parse(rawText); }
                catch (_) { result = rawText.trim(); }

                handleManualWebhookResponse(result);
            } catch (err) {
                alert("❌ " + getErrorMessage(err));
                setSubmitButtonLoading(false, "submitBtn", "กำลังส่งข้อมูล...", "ยืนยันการโอนเงิน");
            }
        }

        function handleManualWebhookResponse(result) {
            if (typeof result === "string") {
                if (result === "OK") {
                    alert("✅ ชำระเงินสำเร็จ! ระบบกำลังทำงาน");
                    return safeCloseLiff();
                }
                alert("❌ " + result);
                setSubmitButtonLoading(false, "submitBtn", "กำลังส่งข้อมูล...", "ยืนยันการโอนเงิน");
                return;
            }

            if (!result || typeof result !== "object") {
                alert("❌ รูปแบบข้อมูลตอบกลับไม่ถูกต้อง");
                setSubmitButtonLoading(false, "submitBtn", "กำลังส่งข้อมูล...", "ยืนยันการโอนเงิน");
                return;
            }

            const success = result.success === true || result.status === "success" || result.status === "SUCCESS" || result.status === "OK";
            const slipValid = result.easyslip_valid !== false && result.slip_valid !== false && result.valid !== false;
            const amountMatch = result.amount_match !== false && result.price_match !== false;
            const isDuplicate = result.is_duplicate === true || result.duplicated === true || result.duplicate === true;
            const message = result.message || result.error || result.detail || "";

            if (!success) {
                alert("❌ " + (message || "ไม่สามารถทำรายการได้"));
                setSubmitButtonLoading(false, "submitBtn", "กำลังส่งข้อมูล...", "ยืนยันการโอนเงิน");
                return;
            }
            if (!slipValid) {
                alert("❌ สลิปไม่ผ่านการตรวจสอบ");
                setSubmitButtonLoading(false, "submitBtn", "กำลังส่งข้อมูล...", "ยืนยันการโอนเงิน");
                return;
            }
            if (!amountMatch) {
                alert("❌ ยอดเงินในสลิปไม่ตรงกับยอดที่ต้องชำระ");
                setSubmitButtonLoading(false, "submitBtn", "กำลังส่งข้อมูล...", "ยืนยันการโอนเงิน");
                return;
            }
            if (isDuplicate) {
                alert("❌ สลิปนี้ถูกใช้งานไปแล้ว");
                setSubmitButtonLoading(false, "submitBtn", "กำลังส่งข้อมูล...", "ยืนยันการโอนเงิน");
                return;
            }

            alert("✅ ชำระเงินสำเร็จ ระบบกำลังดำเนินการให้");
            safeCloseLiff();
        }

        function safeCloseLiff() {
            try {
                if (typeof liff !== "undefined" && typeof liff.closeWindow === "function") liff.closeWindow();
            } catch (_) {}
        }

        function getErrorMessage(err) {
            if (!err) return "เกิดข้อผิดพลาดที่ไม่ทราบสาเหตุ";
            if (typeof err === "string") return err;
            if (err.message) return err.message;
            return String(err);
        }
    </script>
</body>
