<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialBoost - ประวัติการสั่งซื้อ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">📋 ประวัติการสั่งซื้อ</h2>
            <p class="text-sm text-slate-500">ตรวจสอบสถานะงานของคุณได้ที่นี่</p>
        </div>

        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
            <p class="mt-4 text-slate-400 italic">กำลังดึงข้อมูลจากระบบ...</p>
        </div>

        <div id="orderList" class="space-y-3"></div>

        <div id="emptyMessage" style="display: none;" class="text-center py-10 bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
            <p class="text-slate-400">ยังไม่พบประวัติการสั่งซื้อ</p>
            <button onclick="safeCloseWindow()" class="mt-4 bg-blue-600 text-white px-8 py-2 rounded-full font-semibold shadow-lg shadow-blue-200">กลับไปหน้าก่อนหน้า</button>
        </div>

        <div id="errorMessage" style="display: none;" class="text-center py-10 bg-white rounded-2xl shadow-sm p-6 border border-red-100">
            <p id="errorText" class="text-red-500">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>
            <button onclick="init()" class="mt-4 bg-red-500 text-white px-8 py-2 rounded-full font-semibold">ลองใหม่</button>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009857155-P69Z9Mo9";
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1a5vOZQV591jVJKoOXByjQvZBeB1IUEREr8qFSHsWsE0/export?format=csv&t=" + Date.now();

        /**
         * แก้ตรงนี้จุดเดียว ถ้าคอลัมน์ในชีตเปลี่ยน
         * นับจาก 0
         */
        const COL = {
            timestamp: 0,
            userId: 8,
            platform: 2,
            service: 3,
            qty: 4,
            price: 5,
            status: 13,
            orderId: 7
        };

        async function init() {
            resetView();

            try {
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
    liff.login({ redirectUri: window.location.href });
    return;
}

                const profile = await liff.getProfile();
                await fetchData(profile.userId);
            } catch (err) {
                showError("ไม่สามารถเริ่มต้นระบบ LIFF ได้: " + getErrorMessage(err));
            }
        }

        function resetView() {
            const loading = document.getElementById("loading");
            const orderList = document.getElementById("orderList");
            const emptyMessage = document.getElementById("emptyMessage");
            const errorMessage = document.getElementById("errorMessage");

            if (loading) loading.style.display = "block";
            if (orderList) orderList.innerHTML = "";
            if (emptyMessage) emptyMessage.style.display = "none";
            if (errorMessage) errorMessage.style.display = "none";
        }

        async function fetchData(myUserId) {
            try {
                // --- ส่วนที่กูเพิ่มให้: ดึงเลข OrderID จากลิงก์ ---
                const urlParams = new URLSearchParams(window.location.search);
                const targetOrderId = urlParams.get('orderID'); 
                // -------------------------------------------

                const response = await fetch(SHEET_CSV_URL, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error("โหลดข้อมูลไม่สำเร็จ (" + response.status + ")");
                }

                const csvText = await response.text();
                const rows = parseCSV(csvText);

                if (!rows || rows.length <= 1) {
                    hideLoading();
                    showEmpty();
                    return;
                }

                const dataRows = rows.slice(1); 

                // --- แก้ไข Logic การ Filter ตรงนี้สัส ---
                const myOrders = dataRows.filter(row => {
                    const matchesUser = String(row[COL.userId] || "").trim() === String(myUserId).trim();
                    
                    // ถ้ามีออเดอร์เจาะจงมาในลิงก์ ให้โชว์แค่อันนั้น แต่ถ้าไม่มีให้โชว์ทั้งหมดของ User
                    if (targetOrderId) {
                        return matchesUser && String(row[COL.orderId] || "").trim() === String(targetOrderId).trim();
                    }
                    return matchesUser;
                }).reverse();
                // ---------------------------------------

                hideLoading();

                if (myOrders.length === 0) {
                    showEmpty();
                    return;
                }

                renderOrders(myOrders);
            } catch (err) {
                hideLoading();
                showError("เกิดข้อผิดพลาดในการโหลดข้อมูล: " + getErrorMessage(err));
            }
        }

        function parseCSV(text) {
            const rows = [];
            let row = [];
            let current = "";
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const next = text[i + 1];

                if (char === '"') {
                    if (inQuotes && next === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === "," && !inQuotes) {
                    row.push(current);
                    current = "";
                } else if ((char === "\n" || char === "\r") && !inQuotes) {
                    if (char === "\r" && next === "\n") i++;
                    row.push(current);

                    if (row.some(cell => String(cell).trim() !== "")) {
                        rows.push(row);
                    }

                    row = [];
                    current = "";
                } else {
                    current += char;
                }
            }

            if (current.length > 0 || row.length > 0) {
                row.push(current);
                if (row.some(cell => String(cell).trim() !== "")) {
                    rows.push(row);
                }
            }

            return rows;
        }

        function renderOrders(orders) {
            const listContainer = document.getElementById("orderList");
            if (!listContainer) return;

            orders.forEach(order => {
                const orderData = normalizeOrder(order);
                const statusInfo = formatStatus(orderData.status);
                const card = createOrderCard(orderData, statusInfo);
                listContainer.appendChild(card);
            });
        }

        function normalizeOrder(order) {
            return {
                orderId: safeValue(order[COL.orderId], "N/A"),
                platform: safeValue(order[COL.platform], "-"),
                service: safeValue(order[COL.service], "-"),
                qty: safeValue(order[COL.qty], "0"),
                price: formatPrice(safeValue(order[COL.price], "0")),
                status: safeValue(order[COL.status], "Pending"),
                timestamp: safeValue(order[COL.timestamp], "-")
            };
        }

        function createOrderCard(order, statusInfo) {
            const card = document.createElement("div");
            card.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-3";

            const topRow = document.createElement("div");
            topRow.className = "flex justify-between items-start mb-3";

            const orderBadge = document.createElement("span");
            orderBadge.className = "text-[10px] uppercase tracking-wider text-slate-400 font-bold";
            orderBadge.textContent = "Order #" + order.orderId;

            const statusBadge = document.createElement("span");
            statusBadge.className = "px-3 py-1 rounded-full text-[11px] font-bold " + statusInfo.colorClass;
            statusBadge.textContent = statusInfo.text;

            topRow.appendChild(orderBadge);
            topRow.appendChild(statusBadge);

            const title = document.createElement("h3");
            title.className = "font-bold text-slate-800 text-lg";
            title.textContent = order.platform + " - " + order.service;

            const detail = document.createElement("p");
            detail.className = "text-sm text-slate-500 mt-1";
            detail.textContent = "จำนวน: " + order.qty + " | ราคา: ฿" + order.price;

            const time = document.createElement("p");
            time.className = "text-[10px] text-slate-300 mt-3 italic";
            time.textContent = order.timestamp;

            card.appendChild(topRow);
            card.appendChild(title);
            card.appendChild(detail);
            card.appendChild(time);

            return card;
        }

        function formatStatus(status) {
            const normalized = String(status || "").trim().toLowerCase();

            if (normalized === "completed" || normalized === "เสร็จสิ้น") {
                return { text: "✅ งานเสร็จแล้ว", colorClass: "bg-green-100 text-green-600" };
            }

            if (normalized === "canceled" || normalized === "cancelled" || normalized === "ยกเลิก") {
                return { text: "❌ ยกเลิก / คืนเงิน", colorClass: "bg-red-100 text-red-600" };
            }

            if (normalized === "processing" || normalized === "pending" || normalized === "in progress" || normalized === "กำลังดำเนินการ") {
                return { text: "🚀 กำลังดำเนินการ", colorClass: "bg-amber-100 text-amber-600" };
            }

            return { text: "⏳ รอตรวจสอบ", colorClass: "bg-slate-100 text-slate-600" };
        }

        function formatPrice(value) {
            const number = Number(String(value).replace(/,/g, ""));
            if (!Number.isFinite(number)) return value;

            return number.toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function safeValue(value, fallback = "") {
            const text = String(value ?? "").trim();
            return text === "" ? fallback : text;
        }

        function hideLoading() {
            const loading = document.getElementById("loading");
            if (loading) loading.style.display = "none";
        }

        function showEmpty() {
            const emptyMessage = document.getElementById("emptyMessage");
            if (emptyMessage) emptyMessage.style.display = "block";
        }

        function showError(message) {
            const errorMessage = document.getElementById("errorMessage");
            const errorText = document.getElementById("errorText");

            if (errorText) errorText.textContent = message || "เกิดข้อผิดพลาดในการโหลดข้อมูล";
            if (errorMessage) errorMessage.style.display = "block";
        }

        function safeCloseWindow() {
            try {
                if (typeof liff !== "undefined" && typeof liff.closeWindow === "function") {
                    liff.closeWindow();
                    return;
                }
            } catch (_) {}

            if (window.history.length > 1) {
                window.history.back();
            }
        }

        function getErrorMessage(err) {
            if (!err) return "ไม่ทราบสาเหตุ";
            if (typeof err === "string") return err;
            if (err.message) return err.message;
            return String(err);
        }

        window.onload = init;
    </script>
</body>
</html>
