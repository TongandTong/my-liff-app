<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialBoost - ติดตามสถานะ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">🔍 ติดตามสถานะงาน</h2>
        <div id="loading" class="text-center py-10">
            <p class="mt-4 text-gray-500 italic">กำลังค้นหาข้อมูลในระบบ...</p>
        </div>
        <div id="orderContainer" class="space-y-4"></div>
        <div id="emptyMessage" style="display: none;" class="text-center py-10 bg-white rounded-xl shadow p-6">
            <p class="text-gray-500">ไม่พบประวัติการสั่งซื้อครับ</p>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009857155-P69Z9Mo9"; 
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1a5vOZQV591jVJKoOXByjQvZBeB1IUEREr8qFSHsWsE0/export?format=csv&t=" + Date.now();

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                loadMyOrders(profile.userId);
            } catch (err) { alert("LIFF Error"); }
        }

        async function loadMyOrders(myUserId) {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').map(row => row.split(',')); // แบบง่าย
                
                // สมมติ: [0]วันที่, [2]userId, [3]Platform, [4]บริการ, [5]จำนวน, [7]ราคา, [8]สถานะ
                const myOrders = rows.filter(row => row[2] && row[2].trim() === myUserId.trim()).reverse();

                document.getElementById("loading").style.display = "none";
                if (myOrders.length === 0) {
                    document.getElementById("emptyMessage").style.display = "block";
                    return;
                }

                const container = document.getElementById("orderContainer");
                myOrders.forEach(order => {
                    const status = (order[8] || "รอดำเนินการ").replace(/"/g, "");
                    const card = document.createElement("div");
                    card.className = "bg-white p-4 rounded-lg shadow border-l-4 " + (status === "เสร็จสิ้น" ? "border-green-500" : "border-yellow-500");
                    card.innerHTML = `
                        <div class="flex justify-between font-bold">
                            <span>${order[3]}</span>
                            <span class="${status === 'เสร็จสิ้น' ? 'text-green-600' : 'text-yellow-600'}">${status}</span>
                        </div>
                        <div class="text-sm text-gray-600 mt-1">${order[4]} (${order[5]} วิว/ฟอล)</div>
                        <div class="text-xs text-gray-400 mt-2">สั่งเมื่อ: ${order[0]}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { alert("โหลดข้อมูลไม่สำเร็จ"); }
        }

        window.onload = initLIFF;
    </script>
</body>
</html>
