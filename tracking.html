<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialBoost - ประวัติการสั่งซื้อ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">📋 ประวัติการสั่งซื้อ</h2>
            <p class="text-sm text-slate-500">ตรวจสอบสถานะงานของมึงได้ที่นี่</p>
        </div>

        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
            <p class="mt-4 text-slate-400 italic">กำลังดึงข้อมูลจากระบบ...</p>
        </div>

        <div id="orderList" class="space-y-3"></div>

        <div id="emptyMessage" style="display: none;" class="text-center py-10 bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
            <p class="text-slate-400">ยังไม่เคยสั่งงานเหรอสัส? <br>ไปสั่งก่อนค่อยมาดู!</p>
            <button onclick="liff.closeWindow()" class="mt-4 bg-blue-600 text-white px-8 py-2 rounded-full font-semibold shadow-lg shadow-blue-200">ไปสั่งงานเลย</button>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009857155-P69Z9Mo9"; // ID เดิมมึง
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1a5vOZQV591jVJKoOXByjQvZBeB1IUEREr8qFSHsWsE0/export?format=csv&t=" + Date.now();

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                fetchData(profile.userId);
            } catch (err) { console.error(err); }
        }

        async function fetchData(myUserId) {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '').trim()));
                
                // สมมติ Column: 0=Timestamp, 2=userId, 3=Platform, 4=Service, 5=Qty, 7=Price, 8=Status, 12=OrderID
                // กรองเฉพาะ userId ของคนนั้น
                const myOrders = rows.filter(r => r[2] === myUserId).reverse();

                document.getElementById('loading').style.display = 'none';

                if (myOrders.length === 0) {
                    document.getElementById('emptyMessage').style.display = 'block';
                    return;
                }

                const listContainer = document.getElementById('orderList');
                myOrders.forEach((order, index) => {
                    const orderId = order[12] || "N/A"; // คอลัมน์ M
                    const rawStatus = order[8] || "Pending";
                    const { text, colorClass } = formatStatus(rawStatus);

                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">Order #${orderId}</span>
                            <span class="px-3 py-1 rounded-full text-[11px] font-bold ${colorClass}">${text}</span>
                        </div>
                        <h3 class="font-bold text-slate-800 text-lg">${order[3]} - ${order[4]}</h3>
                        <p class="text-xs text-slate-500 mt-1">จำนวน: ${order[5]} | ราคา: ฿${order[7]}</p>
                        <p class="text-[10px] text-slate-300 mt-3 italic">${order[0]}</p>
                    `;
                    listContainer.appendChild(card);
                });

            } catch (err) {
                alert("เกิดข้อผิดพลาดในการโหลดข้อมูล");
            }
        }

        function formatStatus(status) {
            status = status.toLowerCase();
            if (status === 'completed' || status === 'เสร็จสิ้น') {
                return { text: "✅ งานเสร็จแล้วจ้า", colorClass: "bg-green-100 text-green-600" };
            } else if (status === 'canceled' || status === 'ยกเลิก') {
                return { text: "❌ ยกเลิก/คืนเงิน", colorClass: "bg-red-100 text-red-600" };
            } else {
                return { text: "🚀 ระบบกำลังเร่งดำเนินการอยู่", colorClass: "bg-amber-100 text-amber-600" };
            }
        }

        window.onload = init;
    </script>
</body>
</html>
