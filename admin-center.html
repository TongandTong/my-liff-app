<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialBoost - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto" id="app">
        <div id="loginSection" class="mt-20 bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl">
            <h1 class="text-2xl font-bold text-center text-yellow-400 mb-6">🔒 Admin Login</h1>
            <input
                type="password"
                id="passInput"
                class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-center mb-4"
                placeholder="กรอกรหัสผ่าน"
                autocomplete="current-password"
            >
            <button
                id="loginBtn"
                onclick="login()"
                class="w-full bg-yellow-500 text-slate-900 font-bold py-4 rounded-2xl hover:bg-yellow-400 transition-all"
            >
                เข้าสู่ระบบ
            </button>
            <p id="status" class="mt-4 text-center text-sm font-bold text-red-400"></p>
        </div>

        <div id="dashboardSection" style="display: none;" class="mt-10">
            <h1 class="text-3xl font-bold text-center text-yellow-400 mb-2">Admin Dashboard</h1>
            <p class="text-center text-slate-400 mb-8">จัดการระบบ SocialBoost</p>

            <div class="space-y-4">
                <a href="admin-override.html" class="block bg-slate-800 p-6 rounded-3xl border border-slate-700 hover:border-yellow-500 transition-all">
                    <h3 class="text-xl font-bold text-white">⚡️ Manual Override</h3>
                    <p class="text-sm text-slate-400">สั่งงานแมนนวลเมื่อระบบมีปัญหา</p>
                </a>

                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <div class="flex justify-between items-center mb-2 gap-3">
                        <h3 class="text-xl font-bold text-white">💰 API Balance</h3>
                        <button
                            onclick="checkBalance()"
                            id="btnCheck"
                            class="bg-blue-600 hover:bg-blue-500 text-white text-xs py-2 px-4 rounded-xl transition-all"
                        >
                            กดเช็คเงิน
                        </button>
                    </div>
                    <p id="balanceShow" class="text-2xl font-bold text-green-400 mt-2">฿ --.--</p>
                    <p class="text-xs text-slate-400 mt-1">ยอดเงินคงเหลือใน 24Social</p>
                </div>

                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 opacity-50">
                    <h3 class="text-xl font-bold text-white">📊 Sales Summary</h3>
                    <p class="text-sm text-red-400">อยู่ระหว่างพัฒนา</p>
                </div>
            </div>

            <button onclick="logout()" class="w-full mt-10 text-slate-500 text-sm">ออกจากระบบ</button>
        </div>
    </div>

    <script>
        const THE_KEY = "100818";
        const SESSION_KEY = "socialboost_admin_ok";
        const WEBHOOK_URL = "https://hook.eu1.make.com/hnfwwdqx1daoy38zvflahwoe1o8mewpg";

        function setStatus(message = "", type = "error") {
            const status = document.getElementById("status");
            if (!status) return;

            status.className = "mt-4 text-center text-sm font-bold";

            if (type === "success") {
                status.classList.add("text-green-400");
            } else if (type === "info") {
                status.classList.add("text-slate-300");
            } else {
                status.classList.add("text-red-400");
            }

            status.textContent = message;
        }

        function clearStatus() {
            setStatus("", "info");
        }

        function showDashboard() {
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("dashboardSection").style.display = "block";
        }

        function showLogin() {
            document.getElementById("loginSection").style.display = "block";
            document.getElementById("dashboardSection").style.display = "none";
        }

        function requireSession() {
            if (sessionStorage.getItem(SESSION_KEY) !== "1") {
                setStatus("session หมดอายุ กรุณาเข้าสู่ระบบใหม่", "error");
                showLogin();
                return false;
            }
            return true;
        }

        function login() {
            const pass = (document.getElementById("passInput").value || "").trim();

            if (!pass) {
                setStatus("กรุณากรอกรหัสผ่าน", "error");
                return;
            }

            if (pass === THE_KEY) {
                sessionStorage.setItem(SESSION_KEY, "1");
                clearStatus();
                showDashboard();
            } else {
                setStatus("รหัสผ่านไม่ถูกต้อง", "error");
            }
        }

        function logout() {
            sessionStorage.removeItem(SESSION_KEY);
            document.getElementById("passInput").value = "";
            clearStatus();
            document.getElementById("balanceShow").textContent = "฿ --.--";
            showLogin();
        }

        async function checkBalance() {
            if (!requireSession()) return;

            const btn = document.getElementById("btnCheck");
            const show = document.getElementById("balanceShow");

            btn.disabled = true;
            btn.textContent = "⌛ กำลังเช็ค...";
            show.textContent = "฿ ...";
            clearStatus();

            try {
                const res = await fetch(WEBHOOK_URL, { method: "GET" });
                const rawText = await res.text();

                if (!res.ok) {
                    throw new Error("Webhook Error (" + res.status + ")");
                }

                let data;
                try {
                    data = JSON.parse(rawText);
                } catch (_) {
                    throw new Error("รูปแบบข้อมูลจาก Make ไม่ถูกต้อง");
                }

                const balance =
                    data?.money ??
                    data?.balance ??
                    data?.amount ??
                    data?.credit ??
                    data?.wallet;

                if (balance !== undefined && balance !== null && balance !== "") {
                    const numericBalance = Number(balance);

                    if (Number.isFinite(numericBalance)) {
                        show.textContent = "฿ " + numericBalance.toLocaleString(undefined, {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        });
                        setStatus("เช็คยอดเงินสำเร็จ", "success");
                    } else {
                        show.textContent = "฿ " + String(balance);
                        setStatus("เช็คยอดเงินสำเร็จ", "success");
                    }
                } else {
                    show.textContent = "ไม่พบยอดเงิน";
                    setStatus("ไม่พบฟิลด์ยอดเงินในข้อมูลที่ Make ส่งกลับมา", "error");
                }
            } catch (err) {
                show.textContent = "เช็คยอดไม่สำเร็จ";
                setStatus(err?.message || "เชื่อมต่อไม่ได้", "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "กดเช็คเงิน";
            }
        }

        window.onload = () => {
            if (sessionStorage.getItem(SESSION_KEY) === "1") {
                showDashboard();
            } else {
                showLogin();
            }
        };

        document.getElementById("passInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                login();
            }
        });

        document.getElementById("passInput").addEventListener("input", function() {
            clearStatus();
        });
    </script>
</body>
</html>
