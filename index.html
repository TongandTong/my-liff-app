<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24Social Payment System</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Helvetica', sans-serif; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { color: #28a745; text-align: center; margin-bottom: 25px; font-size: 22px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; font-size: 14px; }
        select, input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; outline: none; }
        .price-box { background: #f8fff9; padding: 20px; border-radius: 12px; text-align: center; margin: 20px 0; border: 2px dashed #28a745; }
        #totalPrice { font-size: 32px; color: #28a745; font-weight: bold; }
        .payment-info { background: #fff3cd; padding: 15px; border-radius: 10px; border: 1px solid #ffeeba; margin-bottom: 20px; }
        .bank-details { font-size: 18px; font-weight: bold; color: #856404; text-align: center; line-height: 1.6; }
        #slipSection { display: none; }
        button { width: 100%; padding: 16px; background: #28a745; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-secondary { background: #6c757d; margin-top: 10px; }
        small { color: #666; font-size: 12px; margin-top: 5px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div id="orderSection">
            <h2>🛍️ สั่งซื้อบริการ</h2>
            <div class="form-group">
                <label>1. เลือก Platform</label>
                <select id="platformSelect" onchange="filterServices()"><option>กำลังโหลด...</option></select>
            </div>
            <div class="form-group">
                <label>2. เลือกบริการ</label>
                <select id="serviceSelect" onchange="updateMinMax()" disabled><option>-- เลือก Platform ก่อน --</option></select>
            </div>
            <div class="form-group">
                <label>3. วางลิงก์งาน</label>
                <input type="text" id="targetLink" placeholder="วางลิงก์ที่นี่...">
            </div>
            <div class="form-group">
                <label id="qtyLabel">4. ระบุจำนวน</label>
                <input type="number" id="quantity" oninput="calculatePrice()" placeholder="ระบุจำนวน" step="1" inputmode="numeric">
                <small id="limitNote">กรุณาเลือกบริการ</small>
            </div>
            <div class="price-box">
                <span style="color: #666;">ยอดที่ต้องชำระ</span><br>
                <span id="totalPrice">0.00</span> บาท
            </div>
            <button onclick="goToPayment()">ไปหน้าชำระเงิน</button>
        </div>

        <div id="slipSection">
            <h2>💸 ชำระเงิน</h2>
            <div class="payment-info">
                <div class="bank-details">
                    กสิกรไทย (K-Bank)<br>
                    เลขบัญชี: <span style="color: #d9534f;">123-4-56789-0</span><br>
                    ชื่อ: นายปอนด์ สายเปย์
                </div>
                <div style="text-align: center; margin-top: 10px; font-weight: bold;">
                    ยอดที่ต้องโอน: <span id="finalAmount" style="color: #28a745; font-size: 24px;">0.00</span> บาท
                </div>
            </div>
            <div class="form-group">
                <label>แนบสลิปเพื่อยืนยัน</label>
                <input type="file" id="slipFile" accept="image/*">
            </div>
            <button id="submitBtn" onclick="submitOrder()">ส่งข้อมูลแจ้งโอน</button>
            <button class="btn-secondary" onclick="backToOrder()">ย้อนกลับไปแก้ไข</button>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009857155-P69Z9Mo9"; 
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1a5vOZQV591jVJKoOXByjQvZBeB1IUEREr8qFSHsWsE0/export?format=csv&t=" + Date.now();
        const webhookUrl = "https://hook.eu1.make.com/33xiev8snwr1r8slk4oa3cb5843m47ql"; 

        let allServices = [];

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); }
                loadSheetData();
            } catch (err) { console.error(err); }
        }

        async function loadSheetData() {
            try {
                const response = await fetch(SHEET_CSV_URL, { cache: "no-store" });
                const text = await response.text();
                const rows = text.split(/\r?\n/).slice(1);
                allServices = rows.map(row => {
                    const cols = row.split(',');
                    return { id: cols[0]?.trim(), platform: cols[1]?.trim(), name: cols[2]?.trim(), min: parseInt(cols[3]) || 0, max: parseInt(cols[4]) || 0, price: parseFloat(cols[5]) || 0 };
                }).filter(s => s.name);
                const platforms = [...new Set(allServices.map(s => s.platform))];
                const pSelect = document.getElementById('platformSelect');
                pSelect.innerHTML = '<option value="">-- เลือก Platform --</option>';
                platforms.forEach(p => { let opt = document.createElement('option'); opt.value = p; opt.innerHTML = p; pSelect.appendChild(opt); });
            } catch (error) { alert("โหลดข้อมูลพลาด!"); }
        }

        function filterServices() {
            const platform = document.getElementById('platformSelect').value;
            const sSelect = document.getElementById('serviceSelect');
            sSelect.innerHTML = '<option value="">-- เลือกบริการ --</option>';
            if (!platform) { sSelect.disabled = true; return; }
            allServices.filter(s => s.platform === platform).forEach(s => {
                let opt = document.createElement('option'); opt.value = s.id; opt.innerHTML = s.name; sSelect.appendChild(opt);
            });
            sSelect.disabled = false;
        }

        function updateMinMax() {
            const sid = document.getElementById('serviceSelect').value;
            const service = allServices.find(s => s.id == sid);
            if (service) document.getElementById('limitNote').innerHTML = `💡 ขั้นต่ำ: ${service.min.toLocaleString()} | สูงสุด: ${service.max.toLocaleString()}`;
            calculatePrice();
        }

        function calculatePrice() {
            const sid = document.getElementById('serviceSelect').value;
            const qtyInput = document.getElementById('quantity').value;
            const qty = Number(qtyInput);
            const service = allServices.find(s => s.id == sid);
            const total = (service && qty) ? (qty * service.price).toFixed(2) : "0.00";
            document.getElementById('totalPrice').innerHTML = parseFloat(total).toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('finalAmount').innerHTML = parseFloat(total).toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function goToPayment() {
            const sid = document.getElementById('serviceSelect').value;
            const qtyInput = document.getElementById('quantity').value;
            const qty = Number(qtyInput);
            const link = document.getElementById('targetLink').value;
            const service = allServices.find(s => s.id == sid);

            // กลับมาแล้ว! ระบบตรวจเช็คแบบละเอียด
            if (!sid) return alert("❌ มึงยังไม่ได้เลือกบริการเลยสัส!");
            if (!link.trim()) return alert("❌ วางลิงก์งานด้วย เดี๋ยวบอทไปไม่ถูก!");
            if (!qtyInput || qtyInput.includes('.')) return alert("❌ กรุณากรอกจำนวนเป็นเลขจำนวนเต็ม!");
            
            if (service) {
                if (qty < service.min) return alert(`❌ จำนวนน้อยเกินไป! ขั้นต่ำคือ ${service.min}`);
                if (qty > service.max) return alert(`❌ จำนวนมากเกินไป! สูงสุดคือ ${service.max}`);
            }

            document.getElementById('orderSection').style.display = 'none';
            document.getElementById('slipSection').style.display = 'block';
        }

        function backToOrder() {
            document.getElementById('orderSection').style.display = 'block';
            document.getElementById('slipSection').style.display = 'none';
        }

        async function submitOrder() {
            const slipFile = document.getElementById('slipFile').files[0];
            if (!slipFile) return alert("❌ แนบสลิปด้วยสัส!");

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = "กำลังส่งข้อมูล...";

            try {
                // 🔥 จารย์เพิ่มตรงนี้: ไปดึงชื่อจากโปรไฟล์ LINE ของลูกค้ามา!
                const profile = await liff.getProfile();
                const customerName = profile.displayName; 

                const sid = document.getElementById('serviceSelect').value;
                const service = allServices.find(s => s.id == sid);
                const qty = document.getElementById('quantity').value;
                const link = document.getElementById('targetLink').value;

                const reader = new FileReader();
                reader.readAsDataURL(slipFile);
                reader.onload = async () => {
                    const base64Slip = reader.result.split(',')[1];
                    
                    const data = {
                        customer_name: customerName, // ✅ ส่งชื่อลูกค้าไปด้วยแล้ว
                        platform: service.platform,
                        service_name: service.name,
                        quantity: qty,
                        link: link,
                        total_price: (qty * service.price).toFixed(2),
                        slip_image: base64Slip
                    };

                    const response = await fetch(webhookUrl, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    });

                    if (response.ok) {
                        alert("✅ ส่งข้อมูลสำเร็จ! ชื่อคุณคือ: " + customerName);
                        liff.closeWindow();
                    } else {
                        alert("❌ ส่งไม่สำเร็จ!");
                        submitBtn.disabled = false;
                    }
                };
            } catch (err) {
                alert("❌ ดึงชื่อ LINE ไม่ได้: " + err.message);
                submitBtn.disabled = false;
            }
        }

        initLIFF();
    </script>
</body>
</html>
