<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test App</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <div style="padding: 20px; text-align: center;">
        <h2 style="color: blue;">เช็คสถานะการเชื่อมต่อ</h2>
        <p id="status">กำลังเริ่มต้นระบบ...</p>
        <hr>
        <select id="testSelect" style="width: 100%; padding: 10px;">
            <option>-- รอโหลดข้อมูล --</option>
        </select>
    </div>

    <script>
        const LIFF_ID = "2009857155-P69Z9Mo9";
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1a5vOZQV591jVJKoOXByjQvZBeB1IUEREr8qFSHsWsE0/export?format=csv&t=" + Date.now();

        async function start() {
            try {
                document.getElementById('status').innerText = "กำลังต่อกับ LINE...";
                await liff.init({ liffId: LIFF_ID });
                document.getElementById('status').innerText = "ต่อ LINE สำเร็จ! กำลังดึง Sheet...";
                
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const lines = text.split(/\r?\n/).slice(1);
                
                const select = document.getElementById('testSelect');
                select.innerHTML = '';
                
                lines.forEach(line => {
                    const col = line.split(',');
                    if(col.length >= 3) {
                        let opt = document.createElement('option');
                        opt.innerHTML = col[2]; // ช่องชื่อบริการ
                        select.appendChild(opt);
                    }
                });
                document.getElementById('status').innerText = "ดึงข้อมูลสำเร็จแล้วสัส!";
            } catch (e) {
                document.getElementById('status').innerText = "พังเพราะ: " + e.message;
            }
        }
        start();
    </script>
</body>
</html>
