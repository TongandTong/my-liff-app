<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24Social Pro Order</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Helvetica', sans-serif; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { color: #28a745; text-align: center; margin-bottom: 25px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; font-size: 14px; }
        select, input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 10px; 
            border: 1px solid #ddd; 
            box-sizing: border-box; 
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        select:focus, input:focus { border-color: #28a745; box-shadow: 0 0 8px rgba(40,167,69,0.2); }
        .price-box { background: #f8fff9; padding: 20px; border-radius: 12px; text-align: center; margin: 25px 0; border: 2px dashed #28a745; }
        #totalPrice { font-size: 30px; color: #28a745; font-weight: bold; }
        button { width: 100%; padding: 16px; background: #28a745; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        small { color: #666; font-size: 12px; margin-top: 5px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛍️ สั่งซื้อบริการ</h2>
        
        <div class="form-group">
            <label>1. เลือก Platform</label>
            <select id="platformSelect" onchange="filterServices()">
                <option value="">-- กำลังโหลด... --</option>
            </select>
        </div>

        <div class="form-group">
            <label>2. เลือกบริการ</label>
            <select id="serviceSelect" onchange="updateMinMax()" disabled>
                <option value="">-- กรุณาเลือก Platform ก่อน --</option>
            </select>
        </div>

        <div class="form-group">
            <label>3. วางลิงก์งาน</label>
            <input type="text" id="targetLink" placeholder="วางลิงก์ที่นี่...">
        </div>

        <div class="form-group">
            <label id="qtyLabel">4. ระบุจำนวน</label>
            <input type="number" id="quantity" oninput="calculatePrice()" placeholder="กรอกตัวเลข" step="1" inputmode="numeric">
            <small id="limitNote">กรุณาเลือกบริการเพื่อดูเงื่อนไข</small>
        </div>

        <div class="price-box">
            <span style="color: #666;">ยอดชำระสุทธิ</span><br>
            <span id="totalPrice">0.00</span> บาท
        </div>

        <div class="form-group">
            <label>5. แนบสลิปโอนเงิน</label>
            <input type="file" id="slipFile" accept="image/*">
        </div>

        <button onclick="submitOrder()">ยืนยันการสั่งซื้อ</button>
    </div>

    <script>
        const LIFF_ID = "2009857155-P69Z9Mo9"; 
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1a5vOZQV591jVJKoOXByjQvZBeB1IUEREr8qFSHsWsE0/export?format=csv&t=" + Date.now();

        let allServices = [];

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); }
                loadSheetData();
            } catch (err) { console.error(err); }
        }

        async function loadSheetData() {
            try {
                const response = await fetch(SHEET_CSV_URL, { cache: "no-store" });
                const text = await response.text();
                const rows = text.split(/\r?\n/).slice(1);
                
                allServices = rows.map(row => {
                    const cols = row.split(',');
                    return {
                        id: cols[0]?.trim(),
                        platform: cols[1]?.trim(),
                        name: cols[2]?.trim(),
                        min: parseInt(cols[3]) || 0,
                        max: parseInt(cols[4]) || 0,
                        price: parseFloat(cols[5]) || 0
                    };
                }).filter(s => s.name);

                // ดึงรายการ Platform ที่ไม่ซ้ำกัน
                const platforms = [...new Set(allServices.map(s => s.platform))];
                const pSelect = document.getElementById('platformSelect');
                pSelect.innerHTML = '<option value="">-- เลือก Platform --</option>';
                platforms.forEach(p => {
                    let opt = document.createElement('option');
                    opt.value = p; opt.innerHTML = p;
                    pSelect.appendChild(opt);
                });

            } catch (error) { alert("โหลดข้อมูลพลาด!"); }
        }

        function filterServices() {
            const platform = document.getElementById('platformSelect').value;
            const sSelect = document.getElementById('serviceSelect');
            const qtyInput = document.getElementById('quantity');
            
            sSelect.innerHTML = '<option value="">-- เลือกบริการ --</option>';
            document.getElementById('totalPrice').innerHTML = "0.00";
            qtyInput.value = "";
            document.getElementById('limitNote').innerHTML = "กรุณาเลือกบริการ";

            if (!platform) {
                sSelect.disabled = true;
                return;
            }

            const filtered = allServices.filter(s => s.platform === platform);
            filtered.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.id; opt.innerHTML = s.name;
                sSelect.appendChild(opt);
            });
            sSelect.disabled = false;
        }

        function updateMinMax() {
            const sid = document.getElementById('serviceSelect').value;
            const service = allServices.find(s => s.id == sid);
            if (service) {
                document.getElementById('limitNote').innerHTML = `💡 ขั้นต่ำ: ${service.min.toLocaleString()} | สูงสุด: ${service.max.toLocaleString()}`;
                calculatePrice();
            }
        }

        function calculatePrice() {
            const sid = document.getElementById('serviceSelect').value;
            const qty = Number(document.getElementById('quantity').value);
            const service = allServices.find(s => s.id == sid);
            if (service && qty) {
                document.getElementById('totalPrice').innerHTML = (qty * service.price).toLocaleString(undefined, {minimumFractionDigits: 2});
            } else {
                document.getElementById('totalPrice').innerHTML = "0.00";
            }
        }

        async function submitOrder() {
            // ระบบดักเหมือนเดิมเป๊ะๆ
            const sid = document.getElementById('serviceSelect').value;
            const qty = Number(document.getElementById('quantity').value);
            const link = document.getElementById('targetLink').value;
            const slip = document.getElementById('slipFile').files[0];
            const service = allServices.find(s => s.id == sid);

            if (!service || !link.trim() || !slip || qty < service.min || qty > service.max) {
                return alert("กรอกข้อมูลให้ครบและถูกต้องด้วยสัส!");
            }
            alert("กริ๊บมาก! พร้อมไป Phase 3 แล้ว!");
        }

        initLIFF();
    </script>
</body>
</html>
