<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24Social Order System</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Helvetica', sans-serif; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { color: #28a745; text-align: center; margin-bottom: 25px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; font-size: 14px; }
        select, input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 10px; 
            border: 1px solid #ddd; 
            box-sizing: border-box; 
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        select:focus, input:focus { border-color: #28a745; box-shadow: 0 0 8px rgba(40,167,69,0.2); }
        .price-box { 
            background: #f8fff9; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            margin: 25px 0; 
            border: 2px dashed #28a745; 
        }
        #totalPrice { font-size: 30px; color: #28a745; font-weight: bold; }
        .currency { font-size: 18px; color: #28a745; margin-left: 5px; }
        button { 
            width: 100%; 
            padding: 16px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #218838; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        small { color: #666; font-size: 12px; margin-top: 5px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛍️ สั่งซื้อบริการ</h2>
        
        <div class="form-group">
            <label>1. เลือกบริการที่ต้องการ</label>
            <select id="serviceSelect" onchange="updateMinMax()">
                <option value="">-- กำลังโหลดข้อมูล... --</option>
            </select>
        </div>

        <div class="form-group">
            <label>2. วางลิงก์งาน (โปรไฟล์/โพสต์)</label>
            <input type="text" id="targetLink" placeholder="https://www.facebook.com/...">
        </div>

        <div class="form-group">
            <label id="qtyLabel">3. ระบุจำนวน</label>
            <input type="number" id="quantity" oninput="calculatePrice()" placeholder="กรอกตัวเลขจำนวนเต็ม" step="1" inputmode="numeric">
            <small id="limitNote">กรุณาเลือกบริการเพื่อดูขั้นต่ำ</small>
        </div>

        <div class="price-box">
            <span style="color: #666;">ยอดชำระสุทธิ</span><br>
            <span id="totalPrice">0.00</span><span class="currency">บาท</span>
        </div>

        <div class="form-group">
            <label>4. แนบสลิปโอนเงิน</label>
            <input type="file" id="slipFile" accept="image/*">
            <small>* ระบบจะตรวจสอบยอดเงินอัตโนมัติจากสลิป</small>
        </div>

        <button onclick="submitOrder()">ยืนยันการสั่งซื้อ</button>
    </div>

    <script>
        // --- ส่วนที่มึงต้องเช็คให้ดี ---
        const LIFF_ID = "2009857155-P69Z9Mo9"; 
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1a5vOZQV591jVJKoOXByjQvZBeB1IUEREr8qFSHsWsE0/export?format=csv&t=" + Date.now();

        let services = [];

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); }
                loadSheetData();
            } catch (err) { console.error("LIFF Error", err); }
        }

        async function loadSheetData() {
            try {
                const response = await fetch(SHEET_CSV_URL, { cache: "no-store" });
                const text = await response.text();
                const rows = text.split(/\r?\n/).slice(1);
                
                const select = document.getElementById('serviceSelect');
                select.innerHTML = '<option value="">-- เลือกบริการ --</option>';
                services = [];

                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols.length >= 6) {
                        const item = {
                            id: cols[0].trim(),
                            platform: cols[1].trim(),
                            name: cols[2].trim(),
                            min: parseInt(cols[3]) || 0,
                            max: parseInt(cols[4]) || 0,
                            price: parseFloat(cols[5]) || 0
                        };
                        if(item.name) {
                            services.push(item);
                            let opt = document.createElement('option');
                            opt.value = item.id;
                            opt.innerHTML = `[${item.platform}] ${item.name}`;
                            select.appendChild(opt);
                        }
                    }
                });
            } catch (error) { alert("ดึงข้อมูลไม่สำเร็จ เช็ค Tab ใน Google Sheet ด่วนสัส!"); }
        }

        function updateMinMax() {
            const selectedId = document.getElementById('serviceSelect').value;
            const service = services.find(s => s.id == selectedId);
            if (service) {
                document.getElementById('limitNote').innerHTML = `💡 ขั้นต่ำ: ${service.min.toLocaleString()} | สูงสุด: ${service.max.toLocaleString()}`;
                document.getElementById('quantity').min = service.min;
                document.getElementById('quantity').max = service.max;
                calculatePrice();
            }
        }

        function calculatePrice() {
            const selectedId = document.getElementById('serviceSelect').value;
            const qtyInput = document.getElementById('quantity').value;
            const qty = Number(qtyInput);
            const service = services.find(s => s.id == selectedId);
            
            if (service && qty) {
                const total = (qty * service.price).toFixed(2);
                document.getElementById('totalPrice').innerHTML = parseFloat(total).toLocaleString(undefined, {minimumFractionDigits: 2});
            } else {
                document.getElementById('totalPrice').innerHTML = "0.00";
            }
        }

        async function submitOrder() {
            const selectedId = document.getElementById('serviceSelect').value;
            const qtyInput = document.getElementById('quantity').value;
            const qty = Number(qtyInput);
            const link = document.getElementById('targetLink').value;
            const slip = document.getElementById('slipFile').files[0];
            const service = services.find(s => s.id == selectedId);

            // --- ระบบดักพวกกวนตีน ---
            if (!service) return alert("เลือกบริการก่อนสัส!");
            if (!link.trim()) return alert("วางลิงก์ด้วย เดี๋ยวบอทไปไม่ถูก!");
            
            // เช็คเลขทศนิยม
            if (!Number.isInteger(qty) || qtyInput.includes('.')) {
                return alert("อย่ากวนตีน! ใส่เลขจำนวนเต็มเท่านั้น ห้ามมีจุด!");
            }

            // เช็ค Min-Max
            if (qty < service.min || qty > service.max) {
                return alert(`กรอกจำนวนผิด! ขั้นต่ำคือ ${service.min.toLocaleString()} และไม่เกิน ${service.max.toLocaleString()}`);
            }

            if (!slip) return alert("แนบสลิปโอนเงินด้วยสัส ไม่งั้นใครจะทำเงินให้มึง!");

            // --- ถ้าผ่านหมด (เดี๋ยว Phase 3 จะมาแก้ตรงนี้) ---
            alert("ยินดีด้วย! ข้อมูลมึงกริ๊บมาก เดี๋ยวจารย์พาไปต่อ Make.com ใน Phase 3!");
        }

        initLIFF();
    </script>
</body>
</html>
